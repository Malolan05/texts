<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Malolan · Scripture Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fdf8ec;
      --surface: #fffcf2;
      --surface2: #f5edcf;
      --border: #e8d88a;
      --border-strong: #c9a84c;
      --text: #1c160a;
      --text-mid: #4a3a10;
      --text-muted: #8a7040;
      --accent: #b07c10;
      --accent-bright: #d4960e;
      --accent-dim: #fdf3d0;
      --accent-text: #7a5500;
      --verse-bg: #fffef5;
      --verse-border: #e8d060;
      --sidebar-w: 270px;
      --nav-h: 54px;
      --font-reading: 'EB Garamond', Georgia, serif;
      --font-ui: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 7px;
      --radius-lg: 11px;
      --gold1: #b07c10;
      --gold2: #d4960e;
      --gold3: #f0c040;
      --gold4: #fde68a;
    }
    [data-dark] {
      --bg: #120e04;
      --surface: #1c1608;
      --surface2: #261e0a;
      --border: #3a2e0e;
      --border-strong: #5a4818;
      --text: #f5edce;
      --text-mid: #c8a860;
      --text-muted: #7a6030;
      --accent: #d4960e;
      --accent-bright: #f0c040;
      --accent-dim: #2a1f06;
      --accent-text: #f0c040;
      --verse-bg: #1a1408;
      --verse-border: #4a380c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.65;
      transition: background 0.25s, color 0.25s;
    }
    *::-webkit-scrollbar { width: 5px; height: 5px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; }

    /* ═══ NAV ═══ */
    #nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-h);
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      display: flex; align-items: center;
      padding: 0 1.1rem;
      gap: 0.75rem;
    }
    #nav::after {
      content: '';
      position: absolute; bottom: -3px; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold3), transparent);
      opacity: 0.5;
    }
    #nav-logo {
      font-family: 'Cinzel', var(--font-reading);
      font-size: 1.15rem; font-weight: 700; color: var(--accent);
      text-decoration: none; letter-spacing: 0.01em; white-space: nowrap;
      display: flex; align-items: center; gap: 0.4rem;
    }
    #nav-logo::before { content: '✦'; font-size: 0.7rem; color: var(--gold3); }
    #nav-texts-link {
      font-family: var(--font-mono);
      font-size: 0.7rem; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-muted); text-decoration: none;
      padding: 0.3rem 0.6rem; border: 1px solid var(--border); border-radius: var(--radius);
      white-space: nowrap; transition: all 0.15s; margin-left: auto;
    }
    #nav-texts-link:hover { color: var(--accent-text); border-color: var(--border-strong); background: var(--accent-dim); }
    #nav-breadcrumb {
      font-size: 0.79rem; color: var(--text-muted); flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #nav-breadcrumb span { color: var(--text-mid); }
    .nav-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-mid); cursor: pointer; border-radius: var(--radius);
      padding: 0.28rem 0.65rem; font-size: 0.77rem; font-family: var(--font-ui);
      white-space: nowrap; transition: all 0.15s;
    }
    .nav-btn:hover { background: var(--accent-dim); border-color: var(--border-strong); color: var(--accent-text); }

    /* ═══ FONT SIZE CONTROL ═══ */
    #fz-control {
      display: flex; align-items: center; gap: 0;
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden;
    }
    #fz-control .nav-btn {
      border: none; border-radius: 0;
      padding: 0.28rem 0.55rem;
      font-family: var(--font-mono);
    }
    #fz-control .nav-btn:not(:last-child) { border-right: 1px solid var(--border); }
    #fz-control .nav-btn:disabled {
      opacity: 0.35; cursor: not-allowed; background: none; color: var(--text-muted);
    }
    #fz-level {
      font-size: 0.72rem; color: var(--text-muted); font-family: var(--font-mono);
      padding: 0 0.55rem; min-width: 2.6rem; text-align: center; user-select: none;
    }

    /* ═══ LAYOUT ═══ */
    #shell { display: flex; padding-top: var(--nav-h); min-height: 100vh; }

    /* ═══ SIDEBAR ═══ */
    #sidebar {
      position: fixed;
      top: var(--nav-h); bottom: 0; left: 0;
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto; padding: 1rem 0; z-index: 50;
      transition: transform 0.25s ease;
    }
    #sidebar.hidden { transform: translateX(calc(-1 * var(--sidebar-w))); }
    .sidebar-section-title {
      font-size: 0.66rem; font-weight: 600;
      color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.5rem 1rem 0.3rem;
    }
    .toc-item {
      display: block; padding: 0.33rem 1rem;
      font-size: 0.81rem; color: var(--text-mid);
      text-decoration: none; line-height: 1.4;
      border-left: 2px solid transparent;
      transition: all 0.1s; cursor: pointer;
    }
    .toc-item:hover { color: var(--accent); background: var(--accent-dim); }
    .toc-item.active {
      color: var(--accent); font-weight: 500;
      border-left-color: var(--accent);
      background: var(--accent-dim);
    }
    .toc-verse-count {
      font-size: 0.68rem; color: var(--text-muted);
      float: right; margin-top: 1px;
    }

    /* ═══ TOC SECTION DROPDOWN (sidebar verse list) ═══ */
    .toc-section { border-left: 2px solid transparent; }
    .toc-item-row {
      display: flex; align-items: stretch;
    }
    .toc-item-row .toc-item { flex: 1; min-width: 0; }
    .toc-chevron-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); width: 1.6rem; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.1s;
    }
    .toc-chevron-btn:hover { color: var(--accent); }
    .toc-chevron-btn svg { transition: transform 0.18s; }
    .toc-chevron-btn.open svg { transform: rotate(90deg); }
    .toc-verses {
      display: none;
      flex-direction: column;
      padding: 0.1rem 0 0.4rem;
    }
    .toc-verses.open { display: flex; }
    .toc-verse-item {
      display: flex; align-items: baseline; gap: 0.45rem;
      padding: 0.22rem 1rem 0.22rem 2.1rem;
      font-size: 0.74rem; color: var(--text-muted);
      text-decoration: none; cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.1s;
    }
    .toc-verse-item:hover { color: var(--accent-text); background: var(--accent-dim); }
    .toc-verse-num {
      font-family: var(--font-mono); font-size: 0.68rem;
      color: var(--accent-text); flex-shrink: 0;
    }
    .toc-verse-snippet { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    @keyframes verseFlash {
      0%, 100% { background: transparent; }
      30% { background: var(--gold4); }
    }
    .verse-flash { animation: verseFlash 1.1s ease; }

    /* ═══ MAIN ═══ */
    #main {
      flex: 1; margin-left: var(--sidebar-w);
      transition: margin-left 0.25s ease; max-width: 100%;
    }
    #main.nosidebar { margin-left: 0; }
    #content-area {
      max-width: 800px; margin: 0 auto;
      padding: 2rem 2rem 6rem;
    }

    /* ═══ HOME ═══ */
    .home-header {
      padding: 2.5rem 0 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .home-header h1 {
      font-family: var(--font-reading);
      font-size: 2.4rem; font-weight: 700;
      color: var(--accent); letter-spacing: -0.01em;
      margin-bottom: 0.4rem;
      line-height: 1.1;
    }
    .home-header h1 span { color: var(--text-muted); font-weight: 400; }
    .home-header p { color: var(--text-muted); font-size: 0.93rem; }
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 0.65rem;
    }
    .file-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0.9rem 1.1rem;
      cursor: pointer; text-decoration: none; display: block;
      transition: all 0.15s; position: relative; overflow: hidden;
    }
    .file-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--gold3), var(--gold2));
      opacity: 0; transition: opacity 0.15s;
    }
    .file-card:hover { border-color: var(--border-strong); background: var(--accent-dim); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(176,124,16,0.12); }
    .file-card:hover::before { opacity: 1; }
    .file-card-name { font-size: 0.87rem; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 0.2rem; }
    .file-card-sub { font-size: 0.72rem; color: var(--text-muted); }
    .file-card:hover .file-card-name { color: var(--accent-text); }

    /* ═══ SITEWIDE SEARCH MODAL ═══ */
    #search-modal-backdrop {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(18,14,4,0.6); backdrop-filter: blur(3px);
    }
    #search-modal-backdrop.open { display: flex; align-items: flex-start; justify-content: center; padding-top: 10vh; }
    #search-modal {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-lg);
      width: 100%; max-width: 640px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    #sw-search-header {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    #sw-search-input {
      flex: 1; background: none; border: none; outline: none;
      font-size: 1rem; font-family: var(--font-ui); color: var(--text);
      padding: 0.25rem 0;
    }
    #sw-search-input::placeholder { color: var(--text-muted); }
    #sw-search-close {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.2rem; cursor: pointer; line-height: 1; padding: 0.2rem 0.4rem;
      border-radius: 4px; transition: all 0.1s;
    }
    #sw-search-close:hover { background: var(--surface2); color: var(--text); }
    #sw-search-status { font-size: 0.78rem; color: var(--text-muted); padding: 0.4rem 1rem; min-height: 1.8rem; }
    #sw-search-results { max-height: 55vh; overflow-y: auto; }
    .sw-result-group { border-top: 1px solid var(--border); }
    .sw-result-group-title {
      padding: 0.5rem 1rem 0.25rem;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--accent-text);
      background: var(--accent-dim);
      position: sticky; top: 0;
    }
    .sw-result-item {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.1s;
    }
    .sw-result-item:hover { background: var(--accent-dim); }
    .sw-result-item:last-child { border-bottom: none; }
    .sw-result-loc {
      font-size: 0.72rem; color: var(--text-muted); margin-bottom: 0.2rem;
    }
    .sw-result-snippet {
      font-size: 0.85rem; color: var(--text-mid); line-height: 1.5;
    }
    .sw-result-snippet mark { background: var(--gold4); color: var(--text); border-radius: 2px; padding: 0 1px; }
    .sw-empty { padding: 2rem 1rem; text-align: center; color: var(--text-muted); font-size: 0.88rem; }
    #sw-search-footer {
      padding: 0.5rem 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.72rem; color: var(--text-muted);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sw-kbd {
      display: inline-flex; align-items: center; gap: 0.25rem;
    }
    .sw-kbd kbd {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 3px; padding: 0.1rem 0.4rem;
      font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-mid);
    }

    /* ═══ SEARCH BAR (in-file) ═══ */
    #search-wrap {
      position: sticky; top: var(--nav-h); z-index: 40;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0.55rem 1.25rem;
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
    }
    #search-input-box { flex: 1; max-width: 380px; position: relative; }
    #search-input {
      width: 100%; background: var(--surface);
      border: 1px solid var(--border); border-radius: 99px;
      padding: 0.38rem 1rem 0.38rem 2.3rem;
      font-size: 0.84rem; font-family: var(--font-ui);
      color: var(--text); outline: none; transition: border-color 0.15s;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-icon {
      position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%);
      width: 13px; height: 13px; color: var(--text-muted); pointer-events: none;
    }
    #search-nav-btns { display: none; align-items: center; gap: 0.25rem; }
    #search-count { font-size: 0.74rem; color: var(--text-muted); white-space: nowrap; }
    .search-arrow {
      background: none; border: 1px solid var(--border);
      border-radius: 5px; padding: 0.22rem 0.45rem;
      cursor: pointer; color: var(--text-mid); font-size: 0.74rem;
      transition: all 0.1s;
    }
    .search-arrow:hover { background: var(--surface2); }
    #search-clear-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 1.1rem; line-height: 1; padding: 0 0.2rem; }
    #search-clear-btn:hover { color: var(--text); }
    .mark-hit { background: #fde047; color: #1a1000; border-radius: 2px; padding: 0 1px; }
    .mark-hit.active-hit { background: #f59e0b; box-shadow: 0 0 0 2px #fbbf24; }

    /* ═══ STATS BAR ═══ */
    #stats-bar {
      display: flex; gap: 1.5rem; flex-wrap: wrap;
      padding: 0.8rem 0 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .stat { text-align: center; }
    .stat-n { font-size: 1.5rem; font-weight: 700; color: var(--accent); font-family: var(--font-reading); line-height: 1; }
    .stat-l { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-top: 0.1rem; }

    /* ═══ METADATA ═══ */
    .meta-block {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 2rem;
    }
    .meta-block summary {
      padding: 0.7rem 1rem; cursor: pointer; list-style: none;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.83rem; font-weight: 500; color: var(--text-mid); user-select: none;
    }
    .meta-block summary::-webkit-details-marker { display: none; }
    .meta-block summary::after { content: "›"; font-size: 1.1rem; color: var(--text-muted); transition: transform 0.2s; }
    .meta-block[open] summary::after { transform: rotate(90deg); }
    .meta-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .meta-table td { padding: 0.5rem 1rem; border-top: 1px solid var(--border); vertical-align: top; }
    .meta-table td:first-child { color: var(--text-muted); width: 30%; font-weight: 500; }

    /* ═══ SECTIONS ═══ */
    .section-block {
      margin-bottom: 2.5rem;
      scroll-margin-top: calc(var(--nav-h) + 110px);
    }
    .section-header {
      position: sticky;
      top: calc(var(--nav-h) + 47px);
      z-index: 30;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0.55rem 0;
      margin-bottom: 1.25rem;
    }
    .section-title-row {
      display: flex; align-items: center; gap: 0.65rem; flex-wrap: wrap;
    }
    .section-num {
      font-size: 0.68rem; font-weight: 600;
      color: var(--accent-text); background: var(--accent-dim);
      border-radius: 99px; padding: 0.12rem 0.55rem; white-space: nowrap;
    }
    .section-name {
      font-family: var(--font-reading);
      font-size: 1.08rem; font-weight: 600; color: var(--text); flex: 1;
    }
    .section-actions { display: flex; gap: 0.3rem; align-items: center; flex-shrink: 0; }
    .section-toggle-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 5px; padding: 0.18rem 0.5rem;
      font-size: 0.7rem; color: var(--text-muted);
      cursor: pointer; white-space: nowrap; transition: all 0.1s;
    }
    .section-toggle-btn:hover { background: var(--surface2); color: var(--text-mid); }

    /* ═══ VERSES ═══ */
    .verse-block {
      margin-bottom: 1.6rem;
      border-left: 2px solid var(--border);
      padding-left: 1rem;
      transition: border-color 0.2s;
    }
    .verse-block:hover { border-left-color: var(--border-strong); }
    .verse-meta {
      display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;
    }
    .verse-num {
      font-size: 0.68rem; font-family: var(--font-mono);
      color: var(--accent-text); background: var(--accent-dim);
      border-radius: 4px; padding: 0.08rem 0.5rem;
    }
    .verse-actions { margin-left: auto; display: flex; gap: 0.25rem; opacity: 0; transition: opacity 0.15s; }
    .verse-block:hover .verse-actions { opacity: 1; }
    .verse-action-btn {
      background: none; border: 1px solid var(--border);
      font-size: 0.7rem; color: var(--text-muted);
      cursor: pointer; padding: 0.12rem 0.4rem;
      border-radius: 4px; transition: all 0.1s; font-family: var(--font-ui);
    }
    .verse-action-btn:hover { background: var(--surface2); color: var(--text); }
    .verse-original {
      font-family: var(--font-mono);
      background: var(--verse-bg);
      border: 1px solid var(--verse-border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      font-size: 0.87rem; line-height: 1.85;
      white-space: pre-wrap; word-break: break-word;
      margin-bottom: 0.5rem;
      transition: background 0.2s;
    }
    .verse-transliteration {
      font-family: var(--font-ui); font-style: italic;
      font-size: 0.85rem; color: var(--text-muted); line-height: 1.7;
      margin-bottom: 0.4rem; padding: 0 0.25rem;
      display: none;
    }
    .verse-transliteration.visible { display: block; }
    .verse-translation {
      font-family: var(--font-reading);
      font-size: 1rem; font-style: italic;
      color: var(--text-mid); line-height: 1.65;
      margin-bottom: 0.75rem; padding: 0 0.25rem;
    }

    /* ═══ COMMENTARIES ═══ */
    .commentaries-toggle {
      background: none; border: none;
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-size: 0.77rem; font-weight: 500;
      color: var(--accent); cursor: pointer; padding: 0.22rem 0;
      transition: color 0.15s;
    }
    .commentaries-toggle:hover { color: var(--accent-text); }
    .commentaries-toggle svg { transition: transform 0.2s; flex-shrink: 0; }
    .commentaries-toggle.open svg { transform: rotate(180deg); }
    .commentaries-list { margin-top: 0.5rem; display: none; }
    .commentaries-list.open { display: block; }
    .commentary-item {
      margin-bottom: 0.45rem;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: opacity 0.2s;
    }
    .commentary-header {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.45rem 0.75rem;
      cursor: pointer; user-select: none;
      transition: background 0.1s;
    }
    .commentary-header:hover { background: var(--surface2); }
    .commentary-author-badge {
      font-size: 0.7rem; font-weight: 600;
      padding: 0.12rem 0.55rem;
      border-radius: 99px;
      background: var(--accent-dim); color: var(--accent-text);
    }
    .commentary-lang { font-size: 0.68rem; color: var(--text-muted); }
    .commentary-chevron { margin-left: auto; color: var(--text-muted); font-size: 0.75rem; transition: transform 0.2s; }
    .commentary-item.open .commentary-chevron { transform: rotate(180deg); }
    .commentary-body {
      display: none; padding: 0.6rem 0.75rem 0.75rem;
      font-size: 0.88rem; line-height: 1.8;
      color: var(--text-mid); border-top: 1px solid var(--border);
      white-space: pre-wrap; word-break: break-word;
    }
    .commentary-item.open .commentary-body { display: block; }

    /* ═══ READING MODE ═══ */
    body.reading-mode #sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }
    body.reading-mode #main { margin-left: 0; }
    body.reading-mode #content-area { max-width: 700px; }
    body.reading-mode .verse-original {
      font-family: var(--font-reading);
      font-style: italic; font-size: 1rem;
      background: transparent; border-color: transparent;
      border-left: 3px solid var(--border); padding-left: 1rem;
      border-radius: 0;
    }
    body.reading-mode .verse-translation { font-size: 1.05rem; }

    /* ═══ FONT SIZE ═══ */
    html[data-fz="xs"]  { font-size: 13px; }
    html[data-fz="sm"]  { font-size: 14.5px; }
    html[data-fz="md"]  { font-size: 16px; }
    html[data-fz="lg"]  { font-size: 17.5px; }
    html[data-fz="xl"]  { font-size: 19px; }
    html[data-fz="xxl"] { font-size: 21px; }
    body { font-size: 1rem; }

    /* ═══ PROGRESS BAR ═══ */
    #progress-bar {
      position: fixed; top: var(--nav-h); left: 0; right: 0; z-index: 200;
      height: 2px; background: transparent; pointer-events: none;
    }
    #progress-fill {
      height: 100%; width: 0; transition: width 0.1s;
      background: linear-gradient(90deg, var(--gold2), var(--gold3));
    }

    /* ═══ JUMP TOP ═══ */
    #jump-top {
      position: fixed; bottom: 2rem; right: 1.5rem; z-index: 100;
      background: var(--surface); border: 1px solid var(--border-strong);
      color: var(--accent); border-radius: 50%;
      width: 38px; height: 38px;
      display: none; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem;
      box-shadow: 0 2px 10px rgba(176,124,16,0.2);
      transition: all 0.15s;
    }
    #jump-top:hover { background: var(--accent-dim); }
    #jump-top.visible { display: flex; }

    /* ═══ MOBILE ═══ */
    @media (max-width: 680px) {
      :root { --sidebar-w: 80vw; }
      #main { margin-left: 0 !important; }
      #content-area { padding: 1.25rem 1rem 5rem; }
      #search-wrap { padding: 0.45rem 0.9rem; }
      #sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }
      #sidebar.mobile-open { transform: translateX(0); box-shadow: 8px 0 32px rgba(0,0,0,0.2); }
      #sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 49; background: rgba(0,0,0,0.4); }
      #sidebar-overlay.visible { display: block; }
    }

    /* ═══ EMPTY / STATUS ═══ */
    #loading-state {
      display: flex; flex-direction: column; align-items: center;
      gap: 1rem; padding: 4rem 2rem; color: var(--text-muted);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: #c0392b; font-size: 0.9rem; }
    [data-dark] .error-msg { color: #f87171; }

    /* ═══ DIVIDER ═══ */
    .ornament-divider {
      text-align: center; color: var(--border-strong);
      font-size: 0.75rem; letter-spacing: 0.3em;
      margin: 1rem 0 0.5rem;
      user-select: none;
    }

    /* ═══ PANEL SEPARATORS in sidebar ═══ */
    .sidebar-sep { height: 1px; background: var(--border); margin: 0.75rem 0; }

    /* ═══ WORD COUNT / READING TIME ═══ */
    .reading-meta {
      font-size: 0.73rem; color: var(--text-muted);
      padding: 0.35rem 0 1.25rem;
      display: flex; gap: 1rem; flex-wrap: wrap;
    }
    .reading-meta span::before { content: '·'; margin-right: 0.4rem; }
    .reading-meta span:first-child::before { display: none; }

    /* ═══ TEXT ATTRIBUTION (author / category) ═══ */
    .text-attribution {
      display: flex; flex-wrap: wrap; gap: 0.65rem;
      margin: 0 0 1.75rem;
    }
    .attr-chip {
      display: inline-flex; align-items: center; gap: 0.55rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 0.35rem 0.9rem 0.35rem 0.65rem;
      transition: border-color 0.15s, background 0.15s;
    }
    .attr-chip:hover {
      border-color: var(--border-strong);
      background: var(--accent-dim);
    }
    .attr-icon {
      font-size: 0.6rem; color: var(--gold3);
      line-height: 1; flex-shrink: 0;
    }
    .attr-body {
      display: flex; align-items: baseline; gap: 0.4rem;
    }
    .attr-label {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-muted);
    }
    .attr-label::after { content: ':'; }
    .attr-value {
      font-family: var(--font-reading);
      font-size: 0.9rem; font-style: italic;
      color: var(--accent-text);
    }

    /* Tablets */
    @media (min-width:681px) and (max-width:1024px) {
      :root { --sidebar-w: 320px; }
      #content-area { padding: 1.5rem; max-width: 100%; }
      .section-name { font-size: 1.2rem; }
      .verse-original, .verse-translation { font-size: 1rem; }
      #search-input-box { max-width: 100%; }
      #nav-breadcrumb { display:none; }
    }

    @media (max-width:680px) {
      #nav { gap:.3rem; padding:0 .5rem; }
      #nav-breadcrumb { display:none; }
      #fz-control { display:none; }
      .verse-actions { opacity:1; }
      .file-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- SITEWIDE SEARCH MODAL -->
<div id="search-modal-backdrop" onclick="closeSitewideSearch(event)">
  <div id="search-modal">
    <div id="sw-search-header">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="var(--text-muted)" stroke-width="1.5" style="flex-shrink:0"><circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
      <input id="sw-search-input" type="search" placeholder="Search all texts…" autocomplete="off" spellcheck="false">
      <button id="sw-search-close" onclick="closeSitewideSearch(null)" title="Close (Esc)">×</button>
    </div>
    <div id="sw-search-status">Type to search across all loaded texts.</div>
    <div id="sw-search-results"></div>
    <div id="sw-search-footer">
      <span class="sw-kbd"><kbd>↑</kbd><kbd>↓</kbd> navigate · <kbd>Enter</kbd> open · <kbd>Esc</kbd> close</span>
      <span id="sw-loaded-count">Loading index…</span>
    </div>
  </div>
</div>

<!-- NAV -->
<nav id="nav">
  <button id="sidebar-toggle" class="nav-btn" onclick="toggleSidebar()" title="Toggle sidebar (S)" aria-label="Toggle table of contents">☰</button>
  <a id="nav-logo" href="?">Malolan</a>
  <div id="nav-breadcrumb"></div>
  <a id="nav-texts-link" href="https://malolan05.github.io/texts">Texts</a>
  <button class="nav-btn" onclick="openSitewideSearch()" title="Search all texts (Ctrl+K)">⌕ All Texts</button>
  <button id="reading-mode-btn" class="nav-btn" onclick="toggleReadingMode()" title="Reading mode (R)">Read</button>
  <div id="fz-control" title="Text size">
    <button class="nav-btn" id="fz-minus" onclick="changeFontSize(-1)" aria-label="Decrease text size">A−</button>

    <button class="nav-btn" id="fz-plus" onclick="changeFontSize(1)" aria-label="Increase text size">A+</button>
  </div>
  <button class="nav-btn" onclick="toggleDark()" id="dark-btn" title="Toggle dark mode (D)">Dark</button>
</nav>

<!-- PROGRESS BAR -->
<div id="progress-bar"><div id="progress-fill"></div></div>

<div id="shell">
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div id="toc-container">
      <p class="sidebar-section-title">Contents</p>
      <p style="font-size:0.79rem;color:var(--text-muted);padding:0.5rem 1rem;">Open a text to see sections</p>
    </div>
  </aside>

  <!-- MAIN -->
  <div id="main">
    <!-- SEARCH BAR (in-file) -->
    <div id="search-wrap" style="display:none;">
      <div id="search-input-box">
        <svg id="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/>
        </svg>
        <input id="search-input" type="search" placeholder="Search this text…" autocomplete="off" spellcheck="false">
      </div>
      <div id="search-nav-btns">
        <span id="search-count"></span>
        <button class="search-arrow" id="prev-btn" title="Previous (Shift+Enter)">↑</button>
        <button class="search-arrow" id="next-btn" title="Next (Enter)">↓</button>
        <button id="search-clear-btn" title="Clear (Esc)">×</button>
      </div>
      <div style="margin-left:auto;display:flex;gap:0.3rem;flex-shrink:0;">
        <button class="nav-btn" onclick="expandAll(true)">Expand all</button>
        <button class="nav-btn" onclick="expandAll(false)">Collapse all</button>
      </div>
    </div>

    <!-- CONTENT AREA -->
    <div id="content-area">
      <!-- HOME VIEW -->
      <div id="home-view">
        <div class="home-header">
          <h1>Malolan <span>· Scripture Reader</span></h1>
          <p>A structured reader for Sanskrit scriptures with traditional commentaries.</p>
        </div>
        <p class="sidebar-section-title" style="padding:0 0 0.75rem;">Available texts</p>
        <div class="file-grid" id="file-grid"></div>
      </div>

      <!-- FILE VIEW -->
      <div id="file-view" style="display:none;">
        <div id="loading-state" style="display:none;">
          <div class="spinner"></div>
          <span id="loading-text">Loading…</span>
        </div>
        <div id="file-content"></div>
      </div>
    </div>
  </div>
</div>

<!-- JUMP TO TOP -->
<button id="jump-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top" aria-label="Scroll to top">↑</button>

<script>
// ──────────────────────────────────────────────
// FILE LIST — hardcoded; no manifest.json needed.
// To add a new text: drop its JSON into /data/ and add its filename here.
// ──────────────────────────────────────────────
let FILES = [
  "agama-pramanyam.json",
  "aniruddha-samhita.json",
  "lakshmi-tantram.json",
  "paramapurusha-samhita.json",
  "paushkara-samhita.json",
  "sriprashna-samhita.json",
  "sri-vishvaksena-samhita.json",
  "vishnu-samhita.json",
  "sri-parameshvara-samhita.json"
];

const DATA = "../data/Agama/";

let currentData = null;
let currentFile = '';
let searchMatches = [];
let searchIdx = -1;
const FONT_STEPS = ['xs','sm','md','lg','xl','xxl'];
const FONT_STEP_PX = { xs:13, sm:14.5, md:16, lg:17.5, xl:19, xxl:21 };
let fzIdx = 2; // 'md'
let isDark = false;
let isReading = false;
let tocObserver = null;
// Sitewide search index
let swIndex = {};
let swIndexLoaded = new Set();
let swSearchTimer = null;
let swSelectedIdx = -1;
let swResults = [];

// DOM
const homeView = document.getElementById('home-view');
const fileView = document.getElementById('file-view');
const fileContent = document.getElementById('file-content');
const loadingState = document.getElementById('loading-state');
const searchWrap = document.getElementById('search-wrap');
const searchInput = document.getElementById('search-input');
const searchNavBtns = document.getElementById('search-nav-btns');
const searchCountEl = document.getElementById('search-count');
const tocContainer = document.getElementById('toc-container');
const navBreadcrumb = document.getElementById('nav-breadcrumb');
const progressFill = document.getElementById('progress-fill');
const jumpTop = document.getElementById('jump-top');
const sidebar = document.getElementById('sidebar');
const mainEl = document.getElementById('main');
const sidebarOverlay = document.getElementById('sidebar-overlay');
const swModal = document.getElementById('search-modal-backdrop');
const swInput = document.getElementById('sw-search-input');
const swStatus = document.getElementById('sw-search-status');
const swResultsEl = document.getElementById('sw-search-results');
const swLoadedCount = document.getElementById('sw-loaded-count');

// ──────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadPrefs();
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('keydown', onKey);
  document.getElementById('prev-btn').onclick = () => moveSearch(-1);
  document.getElementById('next-btn').onclick = () => moveSearch(1);
  document.getElementById('search-clear-btn').onclick = clearSearch;
  searchInput.addEventListener('input', debounce(doSearch, 220));
  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); moveSearch(e.shiftKey ? -1 : 1); }
    if (e.key === 'Escape') clearSearch();
  });
  // Sitewide search
  swInput.addEventListener('input', () => { clearTimeout(swSearchTimer); swSearchTimer = setTimeout(doSitewideSearch, 250); });
  swInput.addEventListener('keydown', onSwKey);
  // Boot directly — no manifest fetch needed
  loadManifest();
});

// ──────────────────────────────────────────────
// MANIFEST — uses hardcoded FILES list above
// ──────────────────────────────────────────────
function loadManifest() {
  const p = new URLSearchParams(location.search);
  const f = p.get('file');
  if (f && FILES.includes(f)) {
    openFile(f);
  } else {
    renderHome();
  }
  // Preload sitewide search index in background
  preloadSwIndex();
}

// ──────────────────────────────────────────────
// PREFS
// ──────────────────────────────────────────────
function loadPrefs() {
  try {
    const p = JSON.parse(localStorage.getItem('malolan-prefs') || '{}');
    if (p.dark) { isDark = true; document.documentElement.setAttribute('data-dark',''); document.getElementById('dark-btn').textContent = 'Light'; }
    if (p.fzIdx !== undefined && FONT_STEPS[p.fzIdx]) { fzIdx = p.fzIdx; }
    if (p.reading) { isReading = true; document.body.classList.add('reading-mode'); document.getElementById('reading-mode-btn').textContent = 'Full'; }
  } catch(e) {}
  applyFontSize();
}
function savePrefs() {
  localStorage.setItem('malolan-prefs', JSON.stringify({ dark: isDark, fzIdx, reading: isReading }));
}

// ──────────────────────────────────────────────
// THEME / DISPLAY
// ──────────────────────────────────────────────
window.toggleDark = function() {
  isDark = !isDark;
  document.documentElement.toggleAttribute('data-dark', isDark);
  document.getElementById('dark-btn').textContent = isDark ? 'Light' : 'Dark';
  savePrefs();
};

function applyFontSize() {
  const step = FONT_STEPS[fzIdx];
  document.documentElement.setAttribute('data-fz', step);
  const pct = Math.round((FONT_STEP_PX[step] / FONT_STEP_PX.md) * 100);
  document.getElementById('fz-level').textContent = pct + '%';
  document.getElementById('fz-minus').disabled = fzIdx === 0;
  document.getElementById('fz-plus').disabled = fzIdx === FONT_STEPS.length - 1;
}
window.changeFontSize = function(dir) {
  fzIdx = Math.max(0, Math.min(FONT_STEPS.length - 1, fzIdx + dir));
  applyFontSize();
  savePrefs();
};

window.toggleReadingMode = function() {
  isReading = !isReading;
  document.body.classList.toggle('reading-mode', isReading);
  document.getElementById('reading-mode-btn').textContent = isReading ? 'Full' : 'Read';
  savePrefs();
};

// ──────────────────────────────────────────────
// SIDEBAR
// ──────────────────────────────────────────────
window.toggleSidebar = function() {
  const isMobile = window.innerWidth <= 680;
  if (isMobile) {
    sidebar.classList.toggle('mobile-open');
    sidebarOverlay.classList.toggle('visible', sidebar.classList.contains('mobile-open'));
  } else {
    sidebar.classList.toggle('hidden');
    mainEl.classList.toggle('nosidebar', sidebar.classList.contains('hidden'));
  }
};
window.closeSidebar = function() {
  sidebar.classList.remove('mobile-open');
  sidebarOverlay.classList.remove('visible');
};

// ──────────────────────────────────────────────
// SCROLL
// ──────────────────────────────────────────────
function onScroll() {
  const h = document.documentElement;
  const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100 || 0;
  progressFill.style.width = pct + '%';
  jumpTop.classList.toggle('visible', h.scrollTop > 400);
}

// ──────────────────────────────────────────────
// KEYBOARD
// ──────────────────────────────────────────────
function onKey(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openSitewideSearch(); return; }
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.key === '/') { e.preventDefault(); searchInput.focus(); searchInput.select(); }
  if (e.key === 'd' || e.key === 'D') toggleDark();
  if (e.key === 'r' || e.key === 'R') toggleReadingMode();
  if (e.key === 's' || e.key === 'S') toggleSidebar();
  if (e.key === 'Escape') { closeSitewideSearch(null); }
}

// ──────────────────────────────────────────────
// HOME
// ──────────────────────────────────────────────
function renderHome() {
  homeView.style.display = '';
  fileView.style.display = 'none';
  searchWrap.style.display = 'none';
  navBreadcrumb.innerHTML = '';
  mainEl.classList.add('nosidebar');
  tocContainer.innerHTML = '<p class="sidebar-section-title">Contents</p><p style="font-size:0.79rem;color:var(--text-muted);padding:0.5rem 1rem;">Open a text to see sections</p>';
  document.title = 'Malolan · Scripture Reader';
  const grid = document.getElementById('file-grid');
  grid.innerHTML = FILES.map(f => {
    const name = f.replace('.json','').replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
    return `<a class="file-card" href="?file=${encodeURIComponent(f)}">
      <div class="file-card-name">${escHtml(name)}</div>
      <div class="file-card-sub">${escHtml(f)}</div>
    </a>`;
  }).join('');
}

// ──────────────────────────────────────────────
// OPEN FILE
// ──────────────────────────────────────────────
async function openFile(fileName) {
  currentFile = fileName;
  homeView.style.display = 'none';
  fileView.style.display = '';
  searchWrap.style.display = 'flex';
  loadingState.style.display = 'flex';
  fileContent.style.display = 'none';
  navBreadcrumb.innerHTML = '';

  const name = fileName.replace('.json','').replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
  document.title = 'Malolan · ' + name;

  try {
    const resp = await fetch(DATA + fileName);
    if (!resp.ok) throw new Error('File not found: ' + fileName);
    const data = await resp.json();
    currentData = data;
    swIndex[fileName] = data;
    swIndexLoaded.add(fileName);

    loadingState.style.display = 'none';
    fileContent.style.display = '';
    renderFile(data, name);
    const shortName = name.length > 40 ? name.slice(0, 37) + '…' : name;
    navBreadcrumb.innerHTML = `<span>← <a href="?" style="color:var(--text-muted);text-decoration:none;">Texts</a></span> &rsaquo; <span>${escHtml(shortName)}</span>`;
    mainEl.classList.remove('nosidebar');
    initTocObserver();
  } catch(err) {
    loadingState.innerHTML = `<p class="error-msg">Could not load "${escHtml(fileName)}".<br>${escHtml(err.message)}</p>`;
  }
}

// ──────────────────────────────────────────────
// RENDER FILE
// ──────────────────────────────────────────────
function renderFile(data, name) {
  let sections = [], totalVerses = 0, totalComms = 0;
  const authorCounts = new Map();
  if (data.content && data.content.sections) sections = data.content.sections;
  sections.forEach(s => {
    (s.verses || []).forEach(v => {
      totalVerses++;
      (v.commentaries || []).forEach(c => {
        totalComms++;
        if (c.author) authorCounts.set(c.author, (authorCounts.get(c.author) || 0) + 1);
      });
    });
  });

  let wordCount = 0;
  sections.forEach(s => (s.verses || []).forEach(v => {
    if (v.original_text) wordCount += v.original_text.split(/\s+/).length;
    if (v.translation) wordCount += v.translation.split(/\s+/).length;
  }));
  const readMins = Math.max(1, Math.round(wordCount / 200));

  let html = '';

  html += `<div id="stats-bar">
    <div class="stat"><div class="stat-n">${sections.length}</div><div class="stat-l">Sections</div></div>
    <div class="stat"><div class="stat-n">${totalVerses}</div><div class="stat-l">Verses</div></div>
    <div class="stat"><div class="stat-n">${totalComms}</div><div class="stat-l">Commentaries</div></div>
    <div class="stat"><div class="stat-n">${authorCounts.size}</div><div class="stat-l">Authors</div></div>
  </div>
  <div class="reading-meta">
    <span>~${wordCount.toLocaleString()} words</span>
    <span>~${readMins} min read</span>
  </div>`;

  const meta = data.metadata || {};
  const attrParts = [];
  if (meta.author)   attrParts.push({ icon: '✦', label: 'Author',   value: meta.author });
  if (meta.category) attrParts.push({ icon: '◈', label: 'Category', value: meta.category });
  if (attrParts.length) {
    html += `<div class="text-attribution">` +
      attrParts.map(p =>
        `<div class="attr-chip">
          <span class="attr-icon">${p.icon}</span>
          <div class="attr-body">
            <span class="attr-label">${escHtml(p.label)}</span>
            <span class="attr-value">${escHtml(p.value)}</span>
          </div>
        </div>`
      ).join('') +
    `</div>`;
  }

  if (data.metadata && Object.keys(data.metadata).length) {
    html += `<details class="meta-block">
      <summary>Metadata</summary>
      <table class="meta-table"><tbody>`;
    for (const [k, v] of Object.entries(data.metadata)) {
      if (v) html += `<tr><td>${escHtml(k.replace(/_/g,' '))}</td><td>${escHtml(String(v))}</td></tr>`;
    }
    html += `</tbody></table></details>`;
  }

  if (data.content && data.content.title) {
    html += `<h2 style="font-family:var(--font-reading);font-size:1.5rem;font-weight:700;margin-bottom:1rem;color:var(--text);">${escHtml(data.content.title)}</h2>`;
  }

  sections.forEach((sec, si) => {
    const secId = 'sec-' + si;
    html += `<div class="section-block" id="${secId}" data-secidx="${si}">
      <div class="section-header">
        <div class="section-title-row">
          <span class="section-num">${si + 1}</span>
          <span class="section-name">${escHtml(sec.title || 'Section ' + (si+1))}</span>
          <div class="section-actions">
            <button class="section-toggle-btn" onclick="toggleSectionCommentaries('${secId}', true)">Expand</button>
            <button class="section-toggle-btn" onclick="toggleSectionCommentaries('${secId}', false)">Collapse</button>
          </div>
        </div>
      </div>`;

    (sec.verses || []).forEach((verse, vi) => {
      const vNum = verse.verse_number || (vi + 1);
      const vId = `${secId}-v${vi}`;
      html += `<div class="verse-block" id="${vId}">
        <div class="verse-meta">
          <span class="verse-num">${escHtml(String(vNum))}</span>
          <div class="verse-actions">
            ${verse.transliteration ? `<button class="verse-action-btn" onclick="toggleTranslit('${vId}')" title="Toggle transliteration">Translit</button>` : ''}
          </div>
        </div>`;

      if (verse.original_text) {
        html += `<div class="verse-original">${escHtml(verse.original_text)}</div>`;
      }
      if (verse.transliteration) {
        html += `<div class="verse-transliteration" id="translit-${vId}">${escHtml(verse.transliteration)}</div>`;
      }
      if (verse.translation) {
        html += `<div class="verse-translation">${escHtml(verse.translation)}</div>`;
      }

      const comms = verse.commentaries || [];
      if (comms.length) {
        html += `<button class="commentaries-toggle open" id="ct-${vId}" onclick="toggleCommentaries('${vId}')">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M2 3L5 7L8 3H2Z"/></svg>
          ${comms.length} ${comms.length === 1 ? 'commentary' : 'commentaries'}
        </button>
        <div class="commentaries-list open" id="cl-${vId}">`;

        comms.forEach((comm, ci) => {
          const cId = `ci-${vId}-${ci}`;
          const authorKey = comm.author || 'Anonymous';
          html += `<div class="commentary-item open" id="${cId}" data-author="${escAttr(authorKey)}">
            <div class="commentary-header" onclick="toggleCommentary('${cId}')">
              <span class="commentary-author-badge">${escHtml(authorKey)}</span>
              ${comm.language ? `<span class="commentary-lang">${escHtml(comm.language)}</span>` : ''}
              <span class="commentary-chevron">▲</span>
            </div>
            <div class="commentary-body">${escHtml(comm.commentary || '')}</div>
          </div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  });

  fileContent.innerHTML = html;
  buildToc(sections);
}

// ──────────────────────────────────────────────
// TOC
// ──────────────────────────────────────────────
function verseSnippet(verse) {
  const raw = (verse.original_text || verse.translation || '').replace(/\s+/g, ' ').trim();
  return raw.slice(0, 25) + '...';
}

function buildToc(sections) {
  let html = '<p class="sidebar-section-title">Sections</p>';
  sections.forEach((sec, si) => {
    const verses = sec.verses || [];
    const vCount = verses.length;
    html += `<div class="toc-section" data-secidx="${si}">
      <div class="toc-item-row">
        <button class="toc-chevron-btn" id="tocchev-${si}" onclick="toggleTocSection(${si})" aria-label="Toggle verse list" title="Show verses">
          <svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 1L7 4.5L2 8"/></svg>
        </button>
        <a class="toc-item" id="toc-${si}" onclick="jumpToSection(${si})" href="javascript:void(0)">
          <span class="toc-verse-count">${vCount}v</span>
          ${escHtml(sec.title || 'Section ' + (si+1))}
        </a>
      </div>
      <div class="toc-verses" id="tocverses-${si}">`;
    verses.forEach((verse, vi) => {
      const vNum = verse.verse_number || (vi + 1);
      html += `<a class="toc-verse-item" onclick="jumpToVerse(${si},${vi})" href="javascript:void(0)" title="${escAttr(verseSnippet(verse))}">
        <span class="toc-verse-num">${escHtml(String(vNum))}</span>
        <span class="toc-verse-snippet">${escHtml(verseSnippet(verse))}</span>
      </a>`;
    });
    html += `</div></div>`;
  });
  tocContainer.innerHTML = html;
}

function jumpToSection(idx) {
  const el = document.getElementById('sec-' + idx);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  if (window.innerWidth <= 680) closeSidebar();
}

window.toggleTocSection = function(idx) {
  const list = document.getElementById('tocverses-' + idx);
  const chev = document.getElementById('tocchev-' + idx);
  if (!list || !chev) return;
  const open = list.classList.toggle('open');
  chev.classList.toggle('open', open);
};

window.jumpToVerse = function(secIdx, verseIdx) {
  const vId = `sec-${secIdx}-v${verseIdx}`;
  const el = document.getElementById(vId);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.classList.remove('verse-flash');
    void el.offsetWidth;
    el.classList.add('verse-flash');
    setTimeout(() => el.classList.remove('verse-flash'), 1200);
  }
  if (window.innerWidth <= 680) closeSidebar();
};

function initTocObserver() {
  if (tocObserver) tocObserver.disconnect();
  const navH = 56 + 55;
  const opts = { rootMargin: `-${navH}px 0px -60% 0px`, threshold: 0 };
  tocObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const idx = entry.target.id.replace('sec-', '');
        document.querySelectorAll('.toc-item').forEach(t => t.classList.remove('active'));
        const t = document.getElementById('toc-' + idx);
        if (t) { t.classList.add('active'); t.scrollIntoView({ block: 'nearest' }); }
      }
    });
  }, opts);
  document.querySelectorAll('.section-block').forEach(el => tocObserver.observe(el));
}

// ──────────────────────────────────────────────
// EXPAND / COLLAPSE
// ──────────────────────────────────────────────
window.toggleCommentary = function(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
};
window.toggleCommentaries = function(vId) {
  const btn = document.getElementById('ct-' + vId);
  const list = document.getElementById('cl-' + vId);
  if (!btn || !list) return;
  const open = list.classList.toggle('open');
  btn.classList.toggle('open', open);
};
window.toggleSectionCommentaries = function(secId, open) {
  const sec = document.getElementById(secId);
  if (!sec) return;
  sec.querySelectorAll('.commentaries-list').forEach(l => l.classList.toggle('open', open));
  sec.querySelectorAll('.commentaries-toggle').forEach(t => t.classList.toggle('open', open));
  sec.querySelectorAll('.commentary-item').forEach(c => c.classList.toggle('open', open));
};
window.expandAll = function(open) {
  document.querySelectorAll('.commentaries-list').forEach(l => l.classList.toggle('open', open));
  document.querySelectorAll('.commentaries-toggle').forEach(b => b.classList.toggle('open', open));
  document.querySelectorAll('.commentary-item').forEach(c => c.classList.toggle('open', open));
};

// ──────────────────────────────────────────────
// TRANSLITERATION TOGGLE
// ──────────────────────────────────────────────
window.toggleTranslit = function(vId) {
  const el = document.getElementById('translit-' + vId);
  if (el) el.classList.toggle('visible');
};

// ──────────────────────────────────────────────
// IN-FILE SEARCH
// ──────────────────────────────────────────────
let searchTimer = null;
function debounce(fn, ms) { return (...a) => { clearTimeout(searchTimer); searchTimer = setTimeout(() => fn(...a), ms); }; }

function doSearch() {
  const q = searchInput.value.trim().toLowerCase();
  clearHighlights();
  searchMatches = []; searchIdx = -1;
  if (!q) { searchNavBtns.style.display = 'none'; searchCountEl.textContent = ''; return; }
  const walker = document.createTreeWalker(fileContent, NodeFilter.SHOW_TEXT);
  const hits = [];
  let node;
  while (node = walker.nextNode()) {
    const txt = node.textContent.toLowerCase();
    let pos = txt.indexOf(q);
    while (pos !== -1) { hits.push({ node, pos, len: q.length }); pos = txt.indexOf(q, pos + 1); }
  }
  for (let i = hits.length - 1; i >= 0; i--) {
    const { node, pos, len } = hits[i];
    try {
      const range = document.createRange();
      range.setStart(node, pos); range.setEnd(node, pos + len);
      const mark = document.createElement('mark');
      mark.className = 'mark-hit'; range.surroundContents(mark);
      searchMatches.unshift(mark);
      const ci = mark.closest('.commentary-item');
      if (ci) ci.classList.add('open');
      const cl = mark.closest('.commentaries-list');
      if (cl) { cl.classList.add('open'); const btn = document.getElementById('ct-' + cl.id.replace('cl-','')); if (btn) btn.classList.add('open'); }
    } catch(e) {}
  }
  searchNavBtns.style.display = searchMatches.length ? 'flex' : 'none';
  if (searchMatches.length) { searchIdx = 0; highlightActive(); }
  updateSearchCount();
}
function clearHighlights() {
  document.querySelectorAll('.mark-hit').forEach(m => m.replaceWith(document.createTextNode(m.textContent)));
  searchMatches = []; searchIdx = -1;
}
function clearSearch() {
  searchInput.value = ''; clearHighlights();
  searchNavBtns.style.display = 'none'; searchCountEl.textContent = '';
}
function moveSearch(dir) {
  if (!searchMatches.length) return;
  searchMatches[searchIdx]?.classList.remove('active-hit');
  searchIdx = (searchIdx + dir + searchMatches.length) % searchMatches.length;
  highlightActive(); updateSearchCount();
}
function highlightActive() {
  const m = searchMatches[searchIdx]; if (!m) return;
  searchMatches.forEach((el, i) => el.classList.toggle('active-hit', i === searchIdx));
  m.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
function updateSearchCount() {
  searchCountEl.textContent = searchMatches.length ? `${searchIdx+1}/${searchMatches.length}` : '0 results';
}

// ──────────────────────────────────────────────
// SITEWIDE SEARCH
// ──────────────────────────────────────────────
async function preloadSwIndex() {
  for (let i = 0; i < FILES.length; i++) {
    const f = FILES[i];
    if (swIndexLoaded.has(f)) continue;
    try {
      const r = await fetch(DATA + f);
      if (r.ok) { swIndex[f] = await r.json(); swIndexLoaded.add(f); }
    } catch(e) {}
    swLoadedCount.textContent = `${swIndexLoaded.size}/${FILES.length} texts indexed`;
    if (i < FILES.length - 1) await new Promise(r => setTimeout(r, 150));
  }
  swLoadedCount.textContent = `All ${FILES.length} texts indexed`;
}

window.openSitewideSearch = function() {
  swModal.classList.add('open');
  setTimeout(() => swInput.focus(), 50);
  swResultsEl.innerHTML = '';
  swStatus.textContent = 'Type to search across all loaded texts.';
};
window.closeSitewideSearch = function(e) {
  if (e && e.target !== swModal) return;
  swModal.classList.remove('open');
  swInput.value = '';
  swResultsEl.innerHTML = '';
  swResults = [];
  swSelectedIdx = -1;
};

function doSitewideSearch() {
  const q = swInput.value.trim();
  swResults = [];
  swSelectedIdx = -1;
  if (q.length < 2) {
    swResultsEl.innerHTML = '';
    swStatus.textContent = 'Type at least 2 characters to search.';
    return;
  }
  const ql = q.toLowerCase();
  const grouped = {};
  let total = 0;

  for (const [fileName, data] of Object.entries(swIndex)) {
    const sections = (data.content && data.content.sections) || [];
    const hits = [];
    sections.forEach((sec, si) => {
      (sec.verses || []).forEach((verse, vi) => {
        const fields = [
          { label: 'Original', text: verse.original_text || '' },
          { label: 'Translation', text: verse.translation || '' },
          ...( (verse.commentaries || []).map(c => ({ label: c.author || 'Commentary', text: c.commentary || '' })) )
        ];
        fields.forEach(({ label, text }) => {
          const idx = text.toLowerCase().indexOf(ql);
          if (idx !== -1) {
            const start = Math.max(0, idx - 60);
            const end = Math.min(text.length, idx + ql.length + 80);
            const snippet = (start > 0 ? '…' : '') + text.slice(start, end) + (end < text.length ? '…' : '');
            const highlighted = snippet.replace(new RegExp(escRegex(q), 'gi'), m => `<mark>${escHtml(m)}</mark>`);
            hits.push({
              secTitle: sec.title || ('Section ' + (si+1)),
              verseNum: verse.verse_number || (vi + 1),
              label, snippet: highlighted,
              file: fileName, secIdx: si
            });
            total++;
          }
        });
      });
    });
    if (hits.length) grouped[fileName] = hits.slice(0, 6);
  }

  if (total === 0) {
    swResultsEl.innerHTML = `<div class="sw-empty">No results found for "${escHtml(q)}"</div>`;
    swStatus.textContent = `No results in ${swIndexLoaded.size} texts.`;
    return;
  }

  swStatus.textContent = `${total} result${total !== 1 ? 's' : ''} across ${Object.keys(grouped).length} text${Object.keys(grouped).length !== 1 ? 's' : ''}`;
  let html = '';
  for (const [fileName, hits] of Object.entries(grouped)) {
    const niceName = fileName.replace('.json','').replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
    html += `<div class="sw-result-group"><div class="sw-result-group-title">${escHtml(niceName)}</div>`;
    hits.forEach((hit, i) => {
      const idx = swResults.length;
      swResults.push({ file: fileName, secIdx: hit.secIdx });
      html += `<div class="sw-result-item" data-idx="${idx}" onclick="swGoToResult(${idx})">
        <div class="sw-result-loc">${escHtml(hit.secTitle)} · Verse ${hit.verseNum} · ${escHtml(hit.label)}</div>
        <div class="sw-result-snippet">${hit.snippet}</div>
      </div>`;
    });
    html += '</div>';
  }
  swResultsEl.innerHTML = html;
}

window.swGoToResult = function(idx) {
  const r = swResults[idx];
  if (!r) return;
  closeSitewideSearch(null);
  const params = new URLSearchParams({ file: r.file });
  if (currentFile === r.file) {
    const el = document.getElementById('sec-' + r.secIdx);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    history.pushState({}, '', '?' + params.toString());
    openFile(r.file).then(() => {
      setTimeout(() => {
        const el = document.getElementById('sec-' + r.secIdx);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 300);
    });
  }
};

function onSwKey(e) {
  const items = swResultsEl.querySelectorAll('.sw-result-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    swSelectedIdx = Math.min(swSelectedIdx + 1, items.length - 1);
    updateSwSelection(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    swSelectedIdx = Math.max(swSelectedIdx - 1, 0);
    updateSwSelection(items);
  } else if (e.key === 'Enter' && swSelectedIdx >= 0) {
    e.preventDefault();
    swGoToResult(parseInt(items[swSelectedIdx].dataset.idx));
  } else if (e.key === 'Escape') {
    closeSitewideSearch(null);
  }
}
function updateSwSelection(items) {
  items.forEach((el, i) => {
    el.style.background = i === swSelectedIdx ? 'var(--accent-dim)' : '';
  });
  if (items[swSelectedIdx]) items[swSelectedIdx].scrollIntoView({ block: 'nearest' });
}

// ──────────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────────
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function escAttr(s) { return escHtml(s).replace(/\n/g,'&#10;'); }
function escRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// Mobile swipe sidebar
let touchStartX = 0;
document.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; });
document.addEventListener("touchend", e => {
  const endX = e.changedTouches[0].clientX;
  if (window.innerWidth > 680) return;
  if (touchStartX < 25 && endX > 100) {
    sidebar.classList.add("mobile-open");
    sidebarOverlay.classList.add("visible");
  }
  if (touchStartX > 100 && endX < 20) { closeSidebar(); }
});
</script>
